<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4066E0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meow_Daily - 喵喵日记</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/meow-ip.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <div id="app" class="app-container">
        <!-- 装饰背景元素 -->
        <span class="paw-deco paw-1">🐾</span>
        <span class="paw-deco paw-2">🐾</span>
        <span class="paw-deco paw-3">🐾</span>

        <!-- 顶部导航 & Banner -->
        <header class="header-banner">
            <div class="ip-container">
                <img src="assets/icons/meow-ip.png" alt="岁岁 IP">
            </div>
            <h1 class="logo-text">Meow Daily</h1>

            <!-- 极简同步指示 -->
            <div id="sync-btn" class="sync-indicator" style="cursor:pointer;">
                <span class="dot"></span>
                <span class="sync-text">保存并同步</span>
            </div>
        </header>

        <!-- 主内容区 (由 JS 注入 content-wrapper) -->
        <main id="main-content"></main>

        <!-- AI 悬浮球 -->
        <div id="ai-entry" class="ai-fab-button">🐾</div>

        <!-- 底部 Tabbar -->
        <nav class="bottom-tabbar">
            <div class="tab-item active" data-tab="home">
                <span class="icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="tab-item" data-tab="records">
                <span class="icon">📅</span>
                <span>记录</span>
            </div>
            <div class="tab-item" data-tab="profile">
                <span class="icon">🐱</span>
                <span>我的</span>
            </div>
        </nav>
    </div>

    <script src="js/app.js" type="module"></script>
</body>

</html>
